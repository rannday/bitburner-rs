name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: bbrs-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            artifact: bbrs-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p bitburner-cli --release --locked

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/bbrs dist/bbrs
          tar -C dist -czf ${{ matrix.artifact }} bbrs

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\bbrs.exe dist\bbrs.exe
          Compress-Archive -Path dist\bbrs.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
